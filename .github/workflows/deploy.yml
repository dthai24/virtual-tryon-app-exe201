name: 🚀 Auto Deploy to smart-fit.shop

on:
  push:
    branches:
      - main

jobs:
  # ============================================================
  # JOB 1: Build & Push Docker image Backend lên Docker Hub
  # ============================================================
  build-backend:
    name: 🔧 Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-fit:backend-latest

  # ============================================================
  # JOB 2: Build & Push Docker image Frontend lên Docker Hub
  # ============================================================
  build-frontend:
    name: 🎨 Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smart-fit:frontend-latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

  # ============================================================
  # JOB 3: SSH vào server, pull image mới và restart containers
  # ============================================================
  deploy:
    name: 🌐 Deploy lên Server
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: SSH vào server và deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "📥 Pulling images mới từ Docker Hub..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smart-fit:backend-latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smart-fit:frontend-latest

            echo "🔄 Restart containers với image mới..."
            cd ${{ secrets.DEPLOY_DIR }}
            docker compose up -d --no-build backend frontend

            echo "🧹 Dọn dẹp image cũ..."
            docker image prune -f

            echo "✅ Deploy hoàn tất! smart-fit.shop đã cập nhật."
