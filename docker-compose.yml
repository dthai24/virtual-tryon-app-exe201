services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - smartfit

  backend:
    image: ${DOCKER_IMAGE:-kienkieuhihi/smart-fit}:backend-latest
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI}
      FAL_KEY: ${FAL_KEY}
      FAL_TRYON_MODEL: ${FAL_TRYON_MODEL}
      FAL_VIDEO_MODEL: ${FAL_VIDEO_MODEL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - mongo
    volumes:
      - ./backend/public/uploads:/app/public/uploads
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5000}:5000"
    networks:
      - smartfit

  frontend:
    image: ${DOCKER_IMAGE:-kienkieuhihi/smart-fit}:frontend-latest
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    networks:
      - smartfit

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - frontend
      - backend
    networks:
      - smartfit

volumes:
  mongo_data:

networks:
  smartfit:
    driver: bridge
